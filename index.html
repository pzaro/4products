  }

// ═══════════════════════════════════════════════════════════
// STATE & RENDERING
// ═══════════════════════════════════════════════════════════
let currentIndex = 0;

function renderCard(index) {
  const p = products[index];
  const container = document.getElementById('cardContainer');
  
  let indicationsHTML = p.indications.map(ind => `
    <div class="indication-item">
      <strong>${ind.title}</strong>
      ${ind.text}
    </div>
  `).join('');
  
  let ingredientsHTML = p.ingredients.map(ing => `
    <tr>
      <td style="font-weight:bold;color:${p.accentColor};width:25%;">${ing.name}</td>
      <td style="width:55%;"><span class="mechanism">${ing.mechanism}</span></td>
      <td style="width:20%;">${ing.studies}</td>
    </tr>
  `).join('');
  
  container.innerHTML = `
    <div class="card" style="--accent-color:${p.accentColor};">
      
      <div class="product-header">
        <div class="product-img-wrapper">
          <img src="${p.image}" alt="${p.name}" class="product-img" crossorigin="anonymous">
        </div>
        <div class="product-title-area">
          <h2>${p.name}</h2>
          <p class="product-subtitle">${p.subtitle}</p>
          <p class="product-desc">${p.description}</p>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">💊 Δοσολογία & Τρόπος Χρήσης</div>
        <div class="dosage-box">${p.dosage}</div>
      </div>
      
      <div class="section">
        <div class="section-title">🎯 Κλινικές Ενδείξεις</div>
        <div class="indications-grid">
          ${indicationsHTML}
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">🔬 Δραστικά Συστατικά · Μηχανισμός Δράσης · Μελέτες</div>
        <table class="ingredients-table">
          <thead>
            <tr>
              <th>Συστατικό</th>
              <th>Μηχανισμός Δράσης</th>
              <th>Τεκμηρίωση</th>
            </tr>
          </thead>
          <tbody>
            ${ingredientsHTML}
          </tbody>
        </table>
      </div>
      
      <div class="disclaimer">
        <strong>Νομικό Σημείωμα:</strong> Όλες οι ενδείξεις διατυπώνονται σύμφωνα με EU Reg. 1924/2006 &amp; 432/2012. Τα προϊόντα είναι διατροφικά συμπληρώματα/δερμοκαλλυντικά κατά EU Reg. 178/2002 &amp; 1223/2009. Δεν αντικαθιστούν ιατρική θεραπεία. Συμβουλευθείτε τον ιατρό σας πριν τη χρήση σε εγκυμοσύνη, γαλουχία ή σε συγχορήγηση με φαρμακευτική αγωγή.
      </div>
      
    </div>
  `;
  
  // Update counter and dots
  document.getElementById('counter').textContent = `${index + 1} / ${products.length}`;
  renderDots(index);
  
  // Update button states
  document.getElementById('prevBtn').disabled = (index === 0);
  document.getElementById('nextBtn').disabled = (index === products.length - 1);
}

function renderDots(activeIndex) {
  const dotsContainer = document.getElementById('dots');
  dotsContainer.innerHTML = '';
  for (let i = 0; i < products.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === activeIndex ? ' active' : '');
    dot.onclick = () => { currentIndex = i; renderCard(i); };
    dotsContainer.appendChild(dot);
  }
}

function nextProduct() {
  if (currentIndex < products.length - 1) {
    currentIndex++;
    renderCard(currentIndex);
  }
}

function prevProduct() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard(currentIndex);
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') prevProduct();
  if (e.key === 'ArrowRight') nextProduct();
});

// ═══════════════════════════════════════════════════════════
// EXPORT FUNCTIONS
// ═══════════════════════════════════════════════════════════
function exportCurrentCard() {
  const card = document.querySelector('.card');
  if (!card) return;
  
  html2canvas(card, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#ffffff'
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = `Zarkolia_${products[currentIndex].name.replace(/\s+/g, '_')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(err => {
    alert('Σφάλμα εξαγωγής: ' + err.message);
  });
}

async function exportAllCards() {
  const original = currentIndex;
  for (let i = 0; i < products.length; i++) {
    currentIndex = i;
    renderCard(i);
    await new Promise(r => setTimeout(r, 800)); // wait for images to load
    
    const card = document.querySelector('.card');
    await new Promise((resolve, reject) => {
      html2canvas(card, {scale: 2, useCORS: true, backgroundColor: '#ffffff'})
        .then(canvas => {
          const link = document.createElement('a');
          link.download = `Zarkolia_${i+1}_${products[i].name.replace(/\s+/g, '_')}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          resolve();
        }).catch(reject);
    });
    await new Promise(r => setTimeout(r, 500));
  }
  currentIndex = original;
  renderCard(original);
  alert('✓ Εξαγωγή ολοκληρώθηκε! Ελέγξτε τον φάκελο Λήψεων.');
}

// Initialize
renderCard(0);
</script>
